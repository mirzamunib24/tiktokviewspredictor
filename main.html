<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok View Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #010101;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tiktok-gradient {
            background: linear-gradient(45deg, #ff0050, #00f2ea);
        }
        .predict-btn {
            transition: transform 0.1s ease, filter 0.2s ease;
        }
        .predict-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pb-12">

<header class="w-full max-w-md text-center mt-8 mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight mb-2">
        TikTok <span class="text-[#ff0050]">View</span> <span class="text-[#00f2ea]">Predictor</span>
    </h1>
    <p class="text-gray-400 text-sm italic">Analyze your reach before you post</p>
</header>

<main class="w-full max-w-md space-y-6">

<div id="input-section" class="glass-card rounded-3xl p-6 space-y-5">
    <input type="text" id="channelName" placeholder="@username" class="w-full p-4 rounded-xl bg-black/30">
    <textarea id="videoText" placeholder="Write your hook..." class="w-full p-4 rounded-xl bg-black/30"></textarea>
    <button onclick="generatePrediction()" class="w-full py-4 bg-pink-500 rounded-xl font-bold">Predict</button>
</div>

<div id="result-section" class="hidden text-center">
    <h2 id="viewRange" class="text-4xl font-bold"></h2>
</div>

</main>

<script>
function generatePrediction() {
    const views = Math.floor(Math.random() * 10000) + 500;
    document.getElementById('viewRange').innerText = views + " views";
    document.getElementById('input-section').classList.add('hidden');
    document.getElementById('result-section').classList.remove('hidden');
}
</script>

</body>
</html>
